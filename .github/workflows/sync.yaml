name: Sync Data MMPL S9

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python sheet_to_json.py

      - name: Commit mmpl.json if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add mmpl.json
          git diff --cached --quiet || git commit -m "Auto update mmpl.json"
          git push
