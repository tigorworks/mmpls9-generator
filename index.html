<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Daftar Tim MMPL S9</title>

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<style>

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1c1f26;
    margin: 0;
    padding: 40px;
    color: #e6e6e6;
}

.header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
}

h1 {
    margin: 0;
    color: #ffffff;
    font-weight: 600;
}

.refresh-btn {
    background: #4f8cff;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
}

.refresh-btn:hover {
    background: #3b6fd8;
}

.last-update {
    margin-bottom: 20px;
    font-size: 14px;
    color: #9ca3af;
}

.last-update span {
    color: #e6e6e6;
    font-weight: 500;
}

.table-container {
    background: #232733;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.35);
}

table.dataTable thead {
    background: #2c3140;
}

table.dataTable tbody tr {
    background-color: #232733;
}

table.dataTable tbody tr:hover {
    background-color: #2f3445;
}

tr.shown {
    background-color: #2a3040 !important;
}

.dataTables_filter input,
.dataTables_length select {
    background: #2c3140;
    border: 1px solid #3a4052;
    color: #e6e6e6;
    border-radius: 8px;
    padding: 6px 10px;
}

td.details-control {
    cursor: pointer;
    text-align: center;
    width: 30px;
}

.expand-icon {
    font-weight: bold;
    color: #4f8cff;
}

.status-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 14px;
    font-weight: bold;
}

.status-true {
    background-color: #16a34a;
    color: white;
}

.status-false {
    background-color: #dc2626;
    color: white;
}

.wa-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #25D366;
    text-decoration: none;
    font-weight: 500;
}

.wa-link svg {
    width: 16px;
    height: 16px;
    fill: #25D366;
}

.invalid-wa {
    color: #ef4444;
    font-weight: bold;
}

table.dataTable tbody tr td.child {
    background: #202531 !important;
    border-left: 4px solid #4f8cff;
    padding: 15px 20px !important;
}

.child-table {
    border-collapse: collapse;
    width: 100%;
    background: #1b1f2a;
}

.child-table th,
.child-table td {
    padding: 8px 12px;
    border: 1px solid #3a4052;
}

.child-table th {
    background: #2c3140;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 40px;
    font-size: 13px;
    color: #6b7280;
    letter-spacing: 0.5px;
}

.footer span {
    color: #9ca3af;
    font-weight: 500;
}

</style>
</head>

<body>

<div class="header-container">
    <h1>Daftar Tim MMPL S9</h1>
    <button class="refresh-btn" onclick="loadData()">Refresh Data</button>
</div>

<div class="last-update">
    Last Update:
    <span id="lastUpdateText">-</span>
    <span>(UTC+7 - Jakarta)</span>
</div>

<div class="table-container">
<table id="teamTable" class="display" style="width:100%">
<thead>
<tr>
<th></th>
<th>Team Name</th>
<th>Captain</th>
<th>Whatsapp</th>
<th>Logo</th>
<th>ID Card</th>
<th>Total Member</th>
</tr>
</thead>
</table>
</div>

<div class="footer">
    Powered by <span>Tigor M Manurung</span>
</div>

<script>

// (JavaScript tetap sama seperti sebelumnya — tidak berubah)
// Demi ringkas, gunakan script terakhir yang sudah kamu pakai.
// Tidak ada perubahan logic di bagian JS.

</script>

</body>
</html>
