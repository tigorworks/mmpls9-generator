<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>MMPL Season 9 Registered Teams</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #181c23;
  color: #e5e7eb;
  padding: 36px;
  margin: 0;
}

/* Card */
.table-container {
  background:#1f2430;
  padding:22px;
  border-radius:12px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.35);
}

/* Force fixed layout */
#teamTable {
  table-layout: fixed !important;
  width:100% !important;
}

#teamTable th,
#teamTable td {
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* Column widths */
#teamTable th:nth-child(1) { width:40px; }
#teamTable th:nth-child(2) { width:22%; }
#teamTable th:nth-child(3) { width:18%; }
#teamTable th:nth-child(4) { width:18%; }
#teamTable th:nth-child(5) { width:10%; text-align:center; }
#teamTable th:nth-child(6) { width:10%; text-align:center; }
#teamTable th:nth-child(7) { width:12%; text-align:center; }

/* Scroll body height for 10 rows */
.dataTables_scrollBody {
  min-height: 460px !important;
  max-height: 460px !important;
}

/* Expand icon */
td.details-control {
  cursor:pointer;
  text-align:center;
}

.expand-icon {
  width:0;
  height:0;
  border-top:6px solid transparent;
  border-bottom:6px solid transparent;
  border-left:8px solid #f59e0b;
  display:inline-block;
  transition: transform .2s ease;
}

tr.shown .expand-icon {
  transform: rotate(90deg);
}

/* Status */
.status-badge {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:24px;
  height:24px;
  border-radius:50%;
  font-weight:700;
}

.status-true { background:#16a34a; color:white; }
.status-false { background:#dc2626; color:white; }

/* WA */
.wa-link { color:#25D366; text-decoration:none; }
.invalid-wa { color:#ef4444; font-weight:700; }

/* Hover */
table.dataTable tbody tr:hover {
  background:#3f2d16;
  box-shadow: inset 3px 0 0 #f59e0b;
}
</style>
</head>

<body>

<div class="table-container">
<table id="teamTable" class="display">
<thead>
<tr>
<th></th>
<th>Team Name</th>
<th>Captain</th>
<th>Whatsapp</th>
<th>Logo</th>
<th>ID Card</th>
<th>Total</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

let table = null;

function normalizePhone(number){
  if(number == null) return null;
  let digits = String(number).replace(/\D/g,'');
  if(digits.length < 8) return null;
  if(digits.startsWith("62")) return "+" + digits;
  if(digits.startsWith("0")) return "+62" + digits.substring(1);
  if(digits.startsWith("8")) return "+62" + digits;
  return null;
}

function renderWA(number){
  let n = normalizePhone(number);
  if(!n) return '<span class="invalid-wa">x</span>';
  let clean = n.replace("+","");
  return `<a class="wa-link" href="https://wa.me/${clean}" target="_blank">${n}</a>`;
}

function renderStatus(val){
  return val
    ? '<span class="status-badge status-true">✓</span>'
    : '<span class="status-badge status-false">✕</span>';
}

function formatChild(members){
  let html='<table style="width:100%;border-collapse:collapse;">';
  html+='<tr><th>Full Name</th><th>Game ID</th><th>Game Nick</th></tr>';
  members.forEach(m=>{
    html+=`<tr><td>${m.full_name}</td><td>${m.game_id}</td><td>${m.game_nick}</td></tr>`;
  });
  html+='</table>';
  return html;
}

async function loadData(){

  const res = await fetch('mmpl.json?v='+Date.now());
  const data = await res.json();
  const teams = Array.isArray(data.teams) ? data.teams : [];

  if(!table){

    table = $('#teamTable').DataTable({
      data: teams,
      pageLength: 10,
      scrollY: "460px",
      scrollCollapse: true,
      paging: true,
      autoWidth: false,
      columns:[
        {className:'details-control',orderable:false,data:null,defaultContent:'<span class="expand-icon"></span>'},
        {data:'team_name'},
        {data:'captain_name'},
        {data:'captain_whatsapp',render:d=>renderWA(d)},
        {data:'logo',render:d=>renderStatus(d)},
        {data:'idcard',render:d=>renderStatus(d)},
        {data:'members',render:d=>d.length}
      ]
    });

    $('#teamTable tbody').on('click','td.details-control',function(){
      let tr=$(this).closest('tr');
      let row=table.row(tr);

      if(row.child.isShown()){
        row.child.hide();
        tr.removeClass('shown');
      }else{
        table.rows().every(function(){
          if(this.child.isShown()){
            $(this.node()).removeClass('shown');
            this.child.hide();
          }
        });
        row.child(formatChild(row.data().members)).show();
        tr.addClass('shown');
      }
    });

  } else {
    table.clear().rows.add(teams).draw();
  }
}

loadData();

</script>

</body>
</html>
