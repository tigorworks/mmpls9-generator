<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>MMPL Season 9 Registered Teams</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<style>
/* ===== (CSS SAMA SEPERTI VERSI TERAKHIR — TIDAK DIUBAH) ===== */
body {
    font-family: 'Inter', sans-serif;
    background: #181c23;
    padding: 40px;
    color: #e5e7eb;
}
.table-container {
    background: #1f2430;
    padding: 28px;
    border-radius: 14px;
}
table.dataTable tbody tr:hover {
    background-color: #3f2d16;
    box-shadow: inset 3px 0 0 #f59e0b;
}
.expand-icon { color:#f59e0b; font-weight:600; }
.invalid-wa { color:#ef4444; font-weight:600; }
.footer { text-align:center; margin-top:40px; font-size:12px; color:#6b7280; }
</style>
</head>

<body>

<h1>MMPL Season 9 Registered Teams</h1>

<div class="table-container">
<table id="teamTable" class="display" style="width:100%">
<thead>
<tr>
<th></th>
<th>Team Name</th>
<th>Captain</th>
<th>Whatsapp</th>
<th>Logo</th>
<th>ID Card</th>
<th>Total Member</th>
<th style="display:none;">MemberSearch</th>
</tr>
</thead>
</table>
</div>

<div class="footer">
Powered by <strong>Tigor M Manurung</strong>
</div>

<script>

let table;

function normalizePhone(number){
    if(number == null) return null;
    number = String(number);
    let digits = number.replace(/\D/g,'');
    if(digits.length < 8) return null;
    if(digits.startsWith("62")) return "+" + digits;
    if(digits.startsWith("0")) return "+62" + digits.substring(1);
    if(digits.startsWith("8")) return "+62" + digits;
    return null;
}

function renderWA(number){
    let normalized = normalizePhone(number);
    if(!normalized) return '<span class="invalid-wa">x</span>';
    let clean = normalized.replace("+","");
    return `<a href="https://wa.me/${clean}"
            target="_blank"
            rel="noopener noreferrer">
            ${normalized}
            </a>`;
}

function renderStatus(val){
    return val ? '✓' : '✕';
}

function format(members){
    let html='<table style="width:100%">';
    html+='<tr><th>Full Name</th><th>Game ID</th><th>Game Nick</th></tr>';
    members.forEach(m=>{
        html+=`<tr>
                <td>${m.full_name}</td>
                <td>${m.game_id}</td>
                <td>${m.game_nick}</td>
              </tr>`;
    });
    html+='</table>';
    return html;
}

function buildMemberSearch(members){
    let combined = "";
    members.forEach(m=>{
        combined += `${m.full_name} ${m.game_id} ${m.game_nick} `;
    });
    return combined;
}

function loadData(){

    fetch('mmpl.json?v='+Date.now())
    .then(res=>res.json())
    .then(response=>{

        table=$('#teamTable').DataTable({
            destroy:true,
            data:response.teams,
            pageLength:10,
            columns:[
                {
                    className:'details-control',
                    orderable:false,
                    data:null,
                    defaultContent:'<span class="expand-icon">▶</span>'
                },
                {data:'team_name'},
                {data:'captain_name'},
                {data:'captain_whatsapp', render:d=>renderWA(d)},
                {data:'logo', render:d=>renderStatus(d)},
                {data:'idcard', render:d=>renderStatus(d)},
                {data:'members', render:d=>d.length},
                {
                    data:'members',
                    visible:false,
                    searchable:true,
                    render:d=>buildMemberSearch(d)
                }
            ]
        });

        $('#teamTable tbody').off('click').on('click','td.details-control',function(){
            let tr=$(this).closest('tr');
            let row=table.row(tr);
            let icon=$(this).find('.expand-icon');

            if(row.child.isShown()){
                row.child.hide();
                icon.text('▶');
            }else{
                table.rows().every(function(){
                    if(this.child.isShown()){
                        $(this.node()).find('.expand-icon').text('▶');
                        this.child.hide();
                    }
                });
                row.child(format(row.data().members)).show();
                icon.text('▼');
            }
        });

    });
}

loadData();

</script>

</body>
</html>
